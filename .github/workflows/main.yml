name: Python CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test-and-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Configuration de Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Installation des dépendances
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8 pytest

      - name: Vérification du code (Linting)
        run: |
          # Arrête le build s'il y a des erreurs de syntaxe Python
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics

      - name: Test de démarrage de l'API
        run: |
          # Un test rapide pour vérifier que FastAPI se charge sans erreur
          python -c "from main import app; print('App chargée avec succès')"

  deploy:
    needs: test-and-lint
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Déploiement automatique sur Render
        # Cette étape envoie un signal (Webhook) à Render pour lui dire "Le CI est vert, déploie !"
        run: curl -X POST ${{ secrets.RENDER_DEPLOY_HOOK }}